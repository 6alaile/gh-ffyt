name: render-and-upload

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_upload:
        description: "Skip YouTube upload (render only)"
        type: boolean
        default: false
      privacy_status:
        description: "YouTube privacy (overrides YT_PRIVACY_STATUS secret)"
        type: choice
        required: false
        default: ""
        options:
          - public
          - unlisted
          - private
          - ""

# Avoid two parallel runs from a single tag-and-push event combination
concurrency:
  group: render-and-upload-${{ github.ref }}
  cancel-in-progress: false

jobs:
  render:
    name: Render and upload
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install ffmpeg and system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu fonts-liberation

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache HyperFrames (fonts + Chrome)
        uses: actions/cache@v4
        with:
          path: ~/.cache/hyperframes
          key: hf-cache-v1-${{ runner.os }}-${{ hashFiles('hf/index.html') }}
          restore-keys: |
            hf-cache-v1-${{ runner.os }}-

      - name: Show memory headroom
        run: |
          echo "Memory:"
          free -h
          echo "Disk:"
          df -h /

      - name: Lint composition
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        run: npx --yes hyperframes@0.6.103 lint hf
        continue-on-error: true

      - name: Render video
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
        run: |
          npx --yes hyperframes@0.6.103 render hf \
            --output world_cup_video_01_FINAL_v2.mp4 \
            --quality high
        timeout-minutes: 45

      - name: Verify render output
        run: |
          test -f world_cup_video_01_FINAL_v2.mp4
          ls -lh world_cup_video_01_FINAL_v2.mp4
          ffprobe -v error -show_entries \
            stream=codec_name,width,height,r_frame_rate,duration \
            -of default=noprint_wrappers=1 \
            world_cup_video_01_FINAL_v2.mp4

      - name: Upload render artifact (push)
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: world-cup-video-${{ github.sha }}
          path: world_cup_video_01_FINAL_v2.mp4
          retention-days: 90

      - name: Upload render artifact (release tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: world-cup-video-${{ github.ref_name }}
          path: world_cup_video_01_FINAL_v2.mp4
          retention-days: 365

      - name: Upload render artifact (PR preview)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: world-cup-video-pr-${{ github.event.pull_request.number }}
          path: world_cup_video_01_FINAL_v2.mp4
          retention-days: 14

      - name: Upload to YouTube
        if: |
          github.event_name != 'pull_request' &&
          (github.event_name != 'workflow_dispatch' || !inputs.skip_upload)
        env:
          YT_CLIENT_SECRETS_BASE64: ${{ secrets.YT_CLIENT_SECRETS_BASE64 }}
          YT_TOKEN_PICKLE_BASE64:   ${{ secrets.YT_TOKEN_PICKLE_BASE64 }}
          YT_PRIVACY_STATUS:        ${{ github.event.inputs.privacy_status || secrets.YT_PRIVACY_STATUS || 'private' }}
          YT_THUMBNAIL_PATH:        ${{ secrets.YT_THUMBNAIL_PATH }}
          YT_CAPTIONS_PATH:         ${{ secrets.YT_CAPTIONS_PATH }}
          VIDEO_FILE:               world_cup_video_01_FINAL_v2.mp4
        run: python scripts/upload_to_youtube.py
        timeout-minutes: 30
